services:
  #serviço 1: O Back-end FastAPI
  api:
    build: .
    container_name: feedback_api
    command: uv run uvicorn llm_feedback_classifier.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - ./llm_feedback_classifier/config/.env

  #serviço 2: O Front-end Streamlit
  frontend:
    build: .
    container_name: feedback_frontend
    command: uv run streamlit run llm_feedback_classifier/frontend.py --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - ./llm_feedback_classifier/config/.env
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api 